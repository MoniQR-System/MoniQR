<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Module</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bs-maroon: #7B1C2C;
      --bs-maroon-light: #f0e6e8;
      --sidebar-width: 85px;
      --sidebar-expanded: 260px;
      --transition-speed: 0.3s;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #f4f7f6;
      overflow-x: hidden;
    }

    #sidebar {
      width: var(--sidebar-width);
      transition: width var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1030;
      background-color: var(--bs-maroon);
      overflow: hidden;
    }

    #sidebar:hover {
      width: var(--sidebar-expanded);
    }

    .nav-label {
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      font-size: 1.1rem;
    }

    #sidebar:hover .nav-label {
      opacity: 1;
    }

    .sidebar-logo-img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .nav-link {
      transition: all 0.2s ease;
      border-left: 4px solid transparent;
    }

    .nav-link:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .nav-link.active {
      background-color: rgba(255, 255, 255, 0.15);
      border-left-color: #fff;
    }

    #main {
      margin-left: var(--sidebar-width);
      transition: margin-left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 100vh;
    }

    #sidebar:hover+#main {
      margin-left: var(--sidebar-expanded);
    }

    .folder-card {
      background: #e9e9e9;
      border: none;
      border-radius: 25px;
      transition: transform 0.2s, box-shadow 0.2s;
      padding: 2rem 1rem;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      cursor: pointer;
    }

    .folder-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .folder-icon {
      color: var(--bs-maroon);
      font-size: 5rem;
      margin-bottom: 1rem;
      display: block;
    }

    .subject-code {
      font-weight: 700;
      font-size: 1.25rem;
      margin-bottom: 0.25rem;
      color: #333;
    }

    .prof-name {
      font-style: italic;
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 0.5rem;
    }

    .schedule-date {
      font-size: 0.85rem;
      font-style: italic;
      color: #777;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
    }
  </style>
</head>

<body class="d-flex">
  <nav id="sidebar" class="vh-100 position-fixed start-0 top-0 d-flex flex-column text-white shadow">
    <div class="d-flex align-items-center px-3 border-bottom border-white border-opacity-10" style="height: 80px;">
      <div style="min-width: calc(var(--sidebar-width) - 32px);" class="text-center">
        <img src="../img/logo1.png" alt="Logo" class="sidebar-logo-img">
      </div>
    </div>
    <div class="flex-grow-1 pt-4">
      <a href="dashboard.html" class="nav-link text-white d-flex align-items-center py-3 px-0 active">
        <div style="min-width: var(--sidebar-width);" class="text-center"><i class="bi bi-grid-1x2 fs-3"></i>
        </div>
        <span class="nav-label">Dashboard</span>
      </a>
      <a href="#" class="nav-link text-white d-flex align-items-center py-3 px-0 opacity-75">
        <div style="min-width: var(--sidebar-width);" class="text-center"><i class="bi bi-clipboard-data fs-3"></i>
        </div>
        <span class="nav-label">Reports</span>
      </a>
      <a href="archived.html" class="nav-link text-white d-flex align-items-center py-3 px-0 opacity-75">
        <div style="min-width: var(--sidebar-width);" class="text-center"><i class="bi bi-archive fs-3"></i>
        </div>
        <span class="nav-label">Archived Subject</span>
      </a>
    </div>
    <div class="pb-4">
      <a href="logout.html" class="nav-link text-white d-flex align-items-center py-3 px-0 opacity-75">
        <div style="min-width: var(--sidebar-width);" class="text-center"><i class="bi bi-box-arrow-left fs-3"></i>
        </div>
        <span class="nav-label">Sign Out</span>
      </a>
    </div>
  </nav>

  <div id="main" class="flex-grow-1 d-flex flex-column">
    <header class="navbar navbar-expand bg-white border-bottom px-4 px-lg-5 shadow-sm" style="height: 80px;">
      <div class="container-fluid px-0">
        <span class="navbar-brand text-dark m-0 fs-3 fw-bold">MoniQR</span>

        <div class="ms-auto d-flex align-items-center gap-4">
          <span class="text-muted d-none d-sm-inline" id="topbar-date"></span>
          <div class="rounded-circle border d-flex align-items-center justify-content-center bg-light shadow-sm"
            style="width: 45px; height: 45px; cursor: pointer;">
            <i class="bi bi-person-fill fs-4" style="color: #7B1C2C;"></i>
          </div>
        </div>
      </div>
    </header>
    <main class="p-4 p-lg-5">
      <h2 class="mb-4 fw-bold">My Class Folders</h2>
      <div class="row g-4">
        <div class="col-12 col-md-6 col-lg-4">
          <div class="folder-card">
            <i class="bi bi-folder-fill folder-icon"></i>
            <div class="subject-code">COMP 001 – Capstone</div>
            <div class="prof-name"><i class="bi bi-people-fill me-1"></i>51 Students</div>
            <div class="schedule-date">
              <i class="bi bi-calendar"></i>MWF | 9:00 AM - 12:00 PM
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="folder-card">
            <i class="bi bi-folder-fill folder-icon"></i>
            <div class="subject-code">COMP 002 – Seminar</div>
            <div class="prof-name"><i class="bi bi-people-fill me-1"></i>50 Students</div>
            <div class="schedule-date">
              <i class="bi bi-calendar"></i> S | 8:00 AM - 11:00 AM
            </div>
          </div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
          <div class="folder-card">
            <i class="bi bi-folder-fill folder-icon"></i>
            <div class="subject-code">COMP 003 – OJT</div>
            <div class="prof-name"><i class="bi bi-people-fill me-1"></i>54 Students</div>
            <div class="schedule-date">
              <i class="bi bi-calendar"></i> S | 2:00 PM - 8:00 PM
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'short',
      month: 'long',
      day: 'numeric',
      year: 'numeric'
    });
  </script>
</body>

</html>
