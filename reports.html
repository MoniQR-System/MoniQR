<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoniQR - Professional Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css"
    rel="stylesheet" />

  <style>
    :root {
      --bs-maroon: #7B1C2C;
      --bs-maroon-light: #f0e6e8;
      --sidebar-width: 85px;
      --sidebar-expanded: 260px;
      --transition-speed: 0.3s;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f4f7f6;
      overflow-x: hidden;
    }

    #sidebar {
      width: var(--sidebar-width);
      transition: width var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 1030;
      background-color: var(--bs-maroon);
      overflow: hidden;
    }

    #sidebar:hover {
      width: var(--sidebar-expanded);
    }

    .nav-label {
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      font-size: 1.1rem;
    }

    #sidebar:hover .nav-label {
      opacity: 1;
    }

    #main {
      margin-left: var(--sidebar-width);
      transition: margin-left var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 100vh;
    }

    #sidebar:hover+#main {
      margin-left: var(--sidebar-expanded);
    }

    .sidebar-logo-img {
      width: 42px;
      height: 42px;
      object-fit: contain;
    }

    .nav-link {
      transition: all 0.2s ease;
      border-left: 4px solid transparent;
      cursor: pointer;
    }

    .nav-link:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .nav-link.active {
      background-color: rgba(255, 255, 255, 0.15);
      border-left-color: #fff;
    }

    .folder-card {
      width: 240px;
      height: 240px;
      aspect-ratio: 1 / 1;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: pointer;
      border-radius: 40px !important;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: white;
    }

    .folder-card:hover {
      transform: translateY(-10px);
      background-color: var(--bs-maroon-light) !important;
      border: 2px solid var(--bs-maroon);
    }

    .folder-icon {
      font-size: 5rem;
      color: var(--bs-maroon);
    }

    .chart-card {
      background: white;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
      max-width: 900px;
      margin: 0 auto;
    }

    .modal-content {
      border-radius: 30px;
      border: none;
      background-color: #e0e0e0;
    }

    .stat-card {
      background: #f8f9fa;
      border-radius: 20px;
      padding: 15px;
      text-align: center;
      flex: 1;
    }

    .history-container {
      background: #d9d9d9;
      border-radius: 25px;
      padding: 25px;
      margin-top: 20px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr;
      align-items: center;
      padding: 12px 0;
      position: relative;
    }

    .timeline-item:not(:last-child)::after {
      content: "";
      position: absolute;
      left: 7px;
      top: 30px;
      width: 1px;
      height: calc(100% - 15px);
      background: #888;
    }

    .dot {
      height: 14px;
      width: 14px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 15px;
      z-index: 2;
      position: relative;
    }
  </style>
</head>

<body class="d-flex">

  <nav id="sidebar" class="vh-100 position-fixed start-0 top-0 d-flex flex-column text-white shadow">
    <div class="d-flex align-items-center px-3 border-bottom border-white border-opacity-10" style="height: 80px;">
      <div style="min-width: calc(var(--sidebar-width) - 32px);" class="text-center">
        <img src="img/logo1.png" alt="Logo" class="sidebar-logo-img">
      </div>
    </div>
    <div class="flex-grow-1 pt-4">
      <a onclick="showSection('dashboard')" id="nav-dashboard"
        class="nav-link text-white d-flex align-items-center py-3 px-0 active">
        <div style="min-width: var(--sidebar-width);" class="text-center"><i class="bi bi-grid-1x2 fs-3"></i></div>
        <span class="nav-label">Dashboard</span>
      </a>
      <a onclick="showSection('reports')" id="nav-reports"
        class="nav-link text-white d-flex align-items-center py-3 px-0 opacity-75">
        <div style="min-width: var(--sidebar-width);" class="text-center"><i class="bi bi-clipboard-data fs-3"></i>
        </div>
        <span class="nav-label">Reports</span>
      </a>
    </div>
  </nav>

  <div id="main" class="flex-grow-1 d-flex flex-column">
    <header class="navbar navbar-expand bg-white border-bottom px-4 px-lg-5 shadow-sm" style="height: 80px;">
      <div class="container-fluid px-0">
        <span class="navbar-brand text-dark m-0 fs-3 fw-bold">MoniQR</span>
        <div class="ms-auto d-flex align-items-center gap-4">
          <span class="text-muted d-none d-sm-inline" id="topbar-date"></span>
          <div class="rounded-circle border d-flex align-items-center justify-content-center bg-light shadow-sm"
            style="width: 45px; height: 45px;">
            <i class="bi bi-person fs-4"></i>
          </div>
        </div>
      </div>
    </header>

    <main id="section-dashboard" class="p-4 p-lg-5">
      <h3 class="fw-bold mb-5">My Class Folders</h3>
      <div class="d-flex flex-wrap gap-5 justify-content-start">
        <a href="#" data-bs-toggle="modal" data-bs-target="#capstoneModal" class="folder-card shadow-sm">
          <i class="bi bi-folder-fill folder-icon mb-3"></i>
          <span class="fs-6 fw-bold text-dark">COMP 001 – Capstone</span>
        </a>
        <a href="#" data-bs-toggle="modal" data-bs-target="#seminarModal" class="folder-card shadow-sm">
          <i class="bi bi-folder-fill folder-icon mb-3"></i>
          <span class="fs-6 fw-bold text-dark">COMP 002 – Seminar</span>
        </a>
        <a href="#" data-bs-toggle="modal" data-bs-target="#ojtModal" class="folder-card shadow-sm">
          <i class="bi bi-folder-fill folder-icon mb-3"></i>
          <span class="fs-6 fw-bold text-dark">COMP 003 – OJT</span>
        </a>
      </div>
    </main>

    <main id="section-reports" class="p-4 p-lg-5 d-none">
      <h3 class="fw-bold mb-5">Monthly Performance Report</h3>
      <div class="chart-card">
        <canvas id="performanceChart"></canvas>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>

  <script>
    function showSection(sectionId) {
      document.getElementById('section-dashboard').classList.add('d-none');
      document.getElementById('section-reports').classList.add('d-none');
      document.getElementById('nav-dashboard').classList.remove('active', 'opacity-100');
      document.getElementById('nav-reports').classList.remove('active', 'opacity-100');
      document.getElementById('nav-dashboard').classList.add('opacity-75');
      document.getElementById('nav-reports').classList.add('opacity-75');

      document.getElementById('section-' + sectionId).classList.remove('d-none');
      document.getElementById('nav-' + sectionId).classList.add('active', 'opacity-100');
      document.getElementById('nav-' + sectionId).classList.remove('opacity-75');

      if (sectionId === 'reports') { renderChart(); }
    }

    let myChart;
    function renderChart() {
      const ctx = document.getElementById('performanceChart').getContext('2d');
      if (myChart) { myChart.destroy(); }

      myChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['January', 'February', 'March', 'April'], 
          datasets: [
            {
              label: 'Capstone',
              data: [85, 90, 88, 95],
              backgroundColor: '#7B1C2C',
              borderRadius: 10,
            },
            {
              label: 'Seminar',
              data: [70, 85, 80, 92],
              backgroundColor: '#B53748',
              borderRadius: 10,
            },
            {
              label: 'OJT',
              data: [95, 98, 97, 100],
              backgroundColor: '#D9A7B0',
              borderRadius: 10,
            }
          ]
        },
        options: {
          indexAxis: 'y', 
          responsive: true,
          plugins: {
            legend: { position: 'bottom' }
          },
          scales: {
            x: {
              beginAtZero: true,
              max: 100,
              title: { display: true, text: 'Attendance Percentage (%)', font: { weight: 'bold' } }
            },
            y: {
              title: { display: true, text: 'Month', font: { weight: 'bold' } }
            }
          }
        }
      });
    }

    document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('en-US', {
      weekday: 'short', month: 'long', day: 'numeric', year: 'numeric'
    });
  </script>
</body>

</html>
