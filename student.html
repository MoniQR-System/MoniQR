<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoniQR Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      overflow-x: hidden;
      font-family: 'Poppins', sans-serif;
    }

    .left-col {
      width: 60%;
    }

    .right-col {
      width: 40%;
    }

    .bg-image {
      background-image: url('img/main.png');
      background-size: cover;
      background-position: center;
      height: 100vh;
    }

    .login-section {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 3rem;
      text-align: center;
      background-color: #fff;
    }

    .university-logo {
      width: 100px;
      margin-bottom: 25px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 400;
      margin-bottom: 5px;
    }

    .sub-text {
      font-size: 1.3rem;
      color: #333;
      margin-bottom: 40px;
    }

    .btn-portal {
      background-color: #800000;
      color: white;
      width: 90%;
      max-width: 400px;
      padding: 18px;
      font-size: 1.3rem;
      font-weight: 400;
      border: none;
      border-radius: 4px;
      margin-bottom: 25px;
      text-transform: uppercase;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s, background-color 0.2s;
    }

    .btn-portal:hover {
      background-color: #600000;
      color: white;
      transform: translateY(-1px);
    }

    .footer-legal {
      font-size: 0.85rem;
      color: #444;
      position: absolute;
      bottom: 30px;
      line-height: 1.4;
    }

    .footer-legal a {
      color: #0d6efd;
      text-decoration: none;
    }

    @media (max-width: 992px) {

      .left-col,
      .right-col {
        width: 100%;
      }

      .bg-image {
        height: 40vh;
      }

      .login-section {
        height: auto;
        padding: 4rem 2rem;
      }

      .footer-legal {
        position: relative;
        bottom: 0;
        margin-top: 40px;
      }
    }
  </style>
</head>

<body>
  <div class="container-fluid p-0">
    <div class="d-md-flex flex-row">
      <div class="left-col bg-image"></div>
      <div class="right-col login-section">
        <img src="img/logo.png" class="university-logo">
        <h1>Hi Pupian's</h1>
        <p class="sub-text">Please click your destination</p>
        <a href="studentsignin.html" class="btn btn-portal">Student</a>
        <a href="" class="btn btn-portal">Faculty</a>
        <div class="footer-legal">
          By using this service, you understood and <br>
          agree to the PUP Online Services <a href="#">Terms of Use</a> and <a href="#">Privacy Statement</a>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
